<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Populove cool bear smile icon">
  <defs>
    <linearGradient id="bg" x1="36" y1="28" x2="206" y2="218" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe36f"/>
      <stop offset="0.55" stop-color="#ff8a24"/>
      <stop offset="1" stop-color="#ff5a1f"/>
    </linearGradient>
    <linearGradient id="fur" x1="76" y1="48" x2="170" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b542e"/>
      <stop offset="1" stop-color="#4a2b1d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="13" stdDeviation="9" flood-color="#4c1b00" flood-opacity="0.32"/>
    </filter>
    <style>
      .float { animation: floaty 2.4s ease-in-out infinite; transform-origin: 120px 128px; }
      .ears { animation: wiggle 2.4s ease-in-out infinite; transform-origin: 120px 82px; }
      .shine { animation: shine 2.1s ease-in-out infinite; transform-origin: center; }
      .spark { animation: pop 1.7s ease-in-out infinite; transform-origin: center; }
      .smile { animation: smile 2.4s ease-in-out infinite; transform-origin: center; }
      @keyframes floaty { 0%,100% { transform: translateY(2px) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
      @keyframes wiggle { 0%,100% { transform: rotate(0deg); } 35% { transform: rotate(-4deg); } 70% { transform: rotate(4deg); } }
      @keyframes shine { 0%,42% { opacity: 0; transform: translateX(-18px); } 55% { opacity: .95; } 78%,100% { opacity: 0; transform: translateX(34px); } }
      @keyframes pop { 0%,100% { transform: scale(.72); opacity: .35; } 45% { transform: scale(1.1); opacity: 1; } }
      @keyframes smile { 0%,100% { transform: scaleX(.94); } 50% { transform: scaleX(1.08); } }
    </style>
  </defs>
  <rect x="18" y="18" width="204" height="204" rx="54" fill="url(#bg)"/>
  <path d="M38 202c34 22 128 24 165-18" fill="none" stroke="#fff3d6" stroke-width="5" stroke-linecap="round" opacity=".32"/>
  <g class="float" filter="url(#shadow)">
    <g class="ears">
      <circle cx="72" cy="79" r="31" fill="#4a2b1d"/>
      <circle cx="168" cy="79" r="31" fill="#4a2b1d"/>
      <circle cx="76" cy="81" r="15" fill="#ffb15a" opacity=".78"/>
      <circle cx="164" cy="81" r="15" fill="#ffb15a" opacity=".78"/>
    </g>
    <ellipse cx="120" cy="126" rx="75" ry="67" fill="url(#fur)"/>
    <ellipse cx="92" cy="139" rx="15" ry="9" fill="#ff8a9b" opacity=".8"/>
    <ellipse cx="148" cy="139" rx="15" ry="9" fill="#ff8a9b" opacity=".8"/>
    <path d="M72 104c19-10 36-10 50 0v28H72z" fill="#111113"/>
    <path d="M118 104c18-10 35-10 50 0v28h-50z" fill="#111113"/>
    <path d="M120 108v22" stroke="#111113" stroke-width="8" stroke-linecap="round"/>
    <path class="shine" d="M83 108h26" stroke="#fff7db" stroke-width="6" stroke-linecap="round" opacity="0"/>
    <path class="shine" d="M130 108h24" stroke="#fff7db" stroke-width="6" stroke-linecap="round" opacity="0"/>
    <ellipse cx="120" cy="141" rx="25" ry="20" fill="#f3c18c"/>
    <path d="M111 134c4-5 14-5 18 0-2 7-16 7-18 0Z" fill="#25160f"/>
    <path class="smile" d="M101 151c12 14 26 14 38 0" fill="none" stroke="#25160f" stroke-width="7" stroke-linecap="round"/>
    <path d="M68 58l19-13" stroke="#fff3d6" stroke-width="8" stroke-linecap="round"/>
    <path d="M172 50l16 16" stroke="#fff3d6" stroke-width="8" stroke-linecap="round"/>
  </g>
  <circle class="spark" cx="52" cy="58" r="8" fill="#fff3d6"/>
  <path class="spark" d="M188 40l5 12 12 5-12 5-5 12-5-12-12-5 12-5z" fill="#fff3d6" style="animation-delay:.32s"/>
  <path d="M68 197c26 15 79 18 112 0" fill="none" stroke="#111113" stroke-width="7" stroke-linecap="round" opacity=".23"/>
</svg>
