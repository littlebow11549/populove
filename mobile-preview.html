<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>POPULOVE 手機預覽</title>
  <style>
    :root {
      --bg: #0d0d0e;
      --panel: #1b1b1e;
      --line: rgba(255, 255, 255, 0.12);
      --orange: #ff7a1a;
      --text: #f6f1ea;
      --muted: #948b82;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      background:
        radial-gradient(circle at 20% 0%, rgba(255, 122, 26, 0.18), transparent 34%),
        var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .preview-shell {
      display: grid;
      gap: 18px;
      justify-items: center;
      width: min(100%, 480px);
    }

    .preview-title {
      text-align: center;
    }

    .preview-title h1 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.3;
    }

    .preview-title p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .phone {
      width: min(100%, 414px);
      aspect-ratio: 390 / 844;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 34px;
      background: linear-gradient(180deg, #2a2a2f, #101012);
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.5);
    }

    .screen {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid rgba(255, 122, 26, 0.22);
      border-radius: 24px;
      background: #050505;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #0d0d0e;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .actions a {
      min-height: 42px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 122, 26, 0.35);
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
    }

    .actions a:first-child {
      color: #fff;
      background: linear-gradient(135deg, var(--orange), #d94c0d);
    }
  </style>
</head>
<body>
  <main class="preview-shell">
    <div class="preview-title">
      <h1>POPULOVE 手機預覽</h1>
      <p>390 x 844 手機比例，可直接捲動檢查 RWD。</p>
    </div>
    <div class="phone" aria-label="手機預覽框">
      <div class="screen">
        <iframe src="index.html" title="POPULOVE 網站手機預覽"></iframe>
      </div>
    </div>
    <div class="actions">
      <a href="index.html">開啟完整網站</a>
      <a href="index.html#products">查看商品區</a>
      <a href="index.html#contact">查看聯絡區</a>
    </div>
  </main>
</body>
</html>
